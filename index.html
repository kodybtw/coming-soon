<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Open In 2050 — Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: #050505;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(139,92,246,0.4), transparent);
      filter: blur(120px);
      top: -100px;
      left: -100px;
    }

    .glow2 {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(59,130,246,0.4), transparent);
      filter: blur(120px);
      bottom: -100px;
      right: -100px;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
      font-size: 18px;
    }

    .timer {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 16px;
      min-width: 80px;
    }

    .box span {
      display: block;
      font-size: 32px;
      font-weight: 700;
    }

    .label {
      font-size: 12px;
      color: #777;
      margin-top: 5px;
    }

    .pulse {
      margin-top: 20px;
      font-size: 14px;
      color: #888;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="container">

  <h1>Open In 2050</h1>
  <p>The project launches on April 27, 2026</p>

  <div class="timer">
    <div class="box"><span id="days">0</span><div class="label">Days</div></div>
    <div class="box"><span id="hours">0</span><div class="label">Hours</div></div>
    <div class="box"><span id="minutes">0</span><div class="label">Minutes</div></div>
    <div class="box"><span id="seconds">0</span><div class="label">Seconds</div></div>
  </div>

  <div class="pulse">⏳ Something big is coming...</div>

  <div class="buttons">
    <button onclick="sharePage()">🚀 Share</button>
    <button onclick="window.location.href='/faq'">❓ FAQ</button>
  </div>

  <div class="footer">
    © 2026 Open In 2050
  </div>

</div>

<script>
  const targetDate = new Date("2026-04-27T00:00:00");

  function updateTimer() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      document.querySelector(".timer").innerHTML = "🚀 We are live!";
      return;
    }

    document.getElementById("days").textContent = Math.floor(diff / (1000*60*60*24));
    document.getElementById("hours").textContent = Math.floor((diff / (1000*60*60)) % 24);
    document.getElementById("minutes").textContent = Math.floor((diff / (1000*60)) % 60);
    document.getElementById("seconds").textContent = Math.floor((diff / 1000) % 60);
  }

  function sharePage() {
    const url = window.location.href;

    if (navigator.share) {
      navigator.share({
        title: "Open In 2050",
        text: "I found something that opens in 2050 👀",
        url
      });
    } else {
      navigator.clipboard.writeText(url);
      alert("Link copied!");
    }
  }

  setInterval(updateTimer, 1000);
  updateTimer();
</script>

</body>
</html>
